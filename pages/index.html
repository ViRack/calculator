<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Calculator</title>
        <meta charset="UTF-8">
        <link rel="stylesheet" href="../styles/style.css">
       <!-- <script src="../js/game.js"></script> -->
    </head>

    <body>
        <header>
            <a href="./index.html">Calculator</a>
            <a href="./about.html">About</a>
        </header>
        
        <main>
            <div class="calc-wrapper">
                <div class="display">
                    <div class="expression">1</div>
                    <div class="value">1</div>
                </div>

                <div class="function-container">
                    <button class="function-item" id="+">+</button>
                    <button class="function-item" id="-">-</button>
                    <button class="function-item" id="/">/</button>  
                    <button class="function-item" id="*">*</button>
                
                </div>

                <div class="numpad-container">
                    <button class="numpad-item" id="1">1</button>
                    <button class="numpad-item" id="2">2</button>
                    <button class="numpad-item" id="3">3</button>  
                    <button class="numpad-item" id="4">4</button>
                    <button class="numpad-item" id="5">5</button>
                    <button class="numpad-item" id="6">6</button>  
                    <button class="numpad-item" id="7">7</button>
                    <button class="numpad-item" id="8">8</button>
                    <button class="numpad-item" id="9">9</button>  
                    <button class="numpad-item-zero" id="0">0</button>
                </div>
            </div>
        </main>

        <footer>
            <a href="https://github.com/ViRack/calculator">GitHub</a>
        </footer>
    </body>
</html>
